<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplier Portal — Electro Apparels</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d12;--surface:#131620;--surface2:#191d2a;--surface3:#1f2435;
  --border:#252a3a;--accent:#f0a500;--accent2:#3b82f6;
  --green:#22c55e;--red:#ef4444;--orange:#f97316;--purple:#a855f7;--teal:#14b8a6;
  --text:#e4e6ef;--muted:#5a6278;
  --font-d:'Bebas Neue',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;}

/* ===== LOGIN SCREEN ===== */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:100%;max-width:520px;text-align:center;}
.login-logo{font-family:var(--font-d);font-size:32px;letter-spacing:3px;color:var(--accent);margin-bottom:4px;}
.login-sub{font-size:11px;font-family:var(--font-m);color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
.login-label{font-size:11px;font-family:var(--font-m);color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;text-align:left;}
.login-title{font-size:16px;font-weight:600;margin-bottom:6px;}
.login-hint{font-size:11px;color:var(--muted);margin-bottom:20px;}
.sup-card{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;text-align:left;transition:all .2s;width:100%;display:flex;align-items:center;gap:12px;}
.sup-card:hover{border-color:var(--accent);background:rgba(240,165,0,.06);}
.sup-card.selected{border-color:var(--accent);background:rgba(240,165,0,.1);}
.sup-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.sup-card-name{font-size:14px;font-weight:600;}
.sup-card-meta{font-size:11px;color:var(--muted);}
.btn-login{width:100%;padding:12px;border-radius:8px;border:none;background:var(--accent);color:#000;font-family:var(--font-b);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;transition:background .15s;}
.btn-login:hover{background:#ffbb2e;}
.btn-login:disabled{opacity:.4;cursor:not-allowed;}
.no-sup{color:var(--muted);font-size:12px;padding:20px;background:var(--surface2);border-radius:8px;border:1px dashed var(--border);}

/* ===== PORTAL SCREEN ===== */
#portalScreen{display:none;}
.portal-header{background:var(--surface);border-bottom:2px solid var(--accent);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.portal-logo{font-family:var(--font-d);font-size:20px;letter-spacing:2px;color:var(--accent);}
.portal-logo span{color:var(--text);}
.sup-badge{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.portal-body{max-width:900px;margin:0 auto;padding:24px 20px;}

/* TABS */
.ptab-row{display:flex;border-bottom:1px solid var(--border);margin-bottom:22px;}
.ptab{padding:9px 18px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-b);transition:all .2s;}
.ptab.active{color:var(--text);border-bottom-color:var(--accent);}

/* STAT CARDS */
.pstats{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
.pstat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;flex:1;min-width:110px;position:relative;overflow:hidden;}
.pstat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.pstat.a::before{background:var(--accent);}
.pstat.b::before{background:var(--accent2);}
.pstat.o::before{background:var(--orange);}
.pstat.g::before{background:var(--green);}
.pstat-lbl{font-size:9px;font-family:var(--font-m);color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.pstat-val{font-family:var(--font-d);font-size:28px;line-height:1.1;margin-top:2px;}
.pstat-sub{font-size:10px;color:var(--muted);}

/* PO CARDS */
.po-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;border-left:4px solid var(--border);}
.po-card.delayed{border-left-color:var(--orange);}
.po-card.overdue{border-left-color:var(--red);}
.po-card.ok{border-left-color:var(--green);}
.po-card.pending{border-left-color:var(--accent2);}
.po-num{font-family:var(--font-m);font-size:11px;color:var(--accent);}
.po-desc{font-size:14px;font-weight:600;margin:3px 0;}
.po-meta-row{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0 12px;}
.po-meta-item{font-size:11px;}
.po-meta-lbl{color:var(--muted);display:block;font-size:9px;font-family:var(--font-m);text-transform:uppercase;letter-spacing:.5px;}
.badge{display:inline-block;font-size:10px;font-family:var(--font-m);padding:2px 7px;border-radius:3px;}
.badge.g{background:rgba(34,197,94,.15);color:var(--green);}
.badge.o{background:rgba(249,115,22,.15);color:var(--orange);}
.badge.r{background:rgba(239,68,68,.15);color:var(--red);}
.badge.b{background:rgba(59,130,246,.15);color:var(--accent2);}
.badge.y{background:rgba(240,165,0,.15);color:var(--accent);}

/* EDITABLE SECTION */
.edit-section{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:10px;}
.edit-title{font-size:10px;font-family:var(--font-m);color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.edit-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:3px;flex:1;min-width:140px;}
.fg label{font-size:10px;font-family:var(--font-m);color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
input,select,textarea{background:var(--surface3);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:12px;padding:7px 10px;border-radius:5px;outline:none;transition:border-color .2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent2);}
textarea{resize:vertical;}
.btn{padding:7px 14px;border-radius:5px;border:none;font-family:var(--font-b);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.btn-p{background:var(--accent);color:#000;}
.btn-p:hover{background:#ffbb2e;}
.btn-s{background:var(--surface3);color:var(--text);border:1px solid var(--border);}
.btn-s:hover{border-color:var(--accent2);}
.delay-warn{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:5px;padding:8px 11px;font-size:11px;color:var(--orange);margin-bottom:8px;}
.save-confirm{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:5px;padding:8px 11px;font-size:11px;color:var(--green);margin-top:8px;display:none;}

/* DISPATCH VIEW */
.dispatch-day{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
.dispatch-date{font-family:var(--font-d);font-size:20px;letter-spacing:.5px;color:var(--accent);margin-bottom:10px;}
.dispatch-wh{background:var(--surface2);border-radius:7px;padding:11px 13px;margin-bottom:8px;}
.dispatch-wh-name{font-size:12px;font-weight:600;margin-bottom:4px;}
.dispatch-po-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;flex-wrap:wrap;}
.dispatch-po-row:last-child{border-bottom:none;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:10px 16px;border-radius:7px;font-size:12px;z-index:9999;font-family:var(--font-m);max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s;}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:12px;}

/* REFRESH */
.refresh-bar{background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.15);border-radius:6px;padding:7px 12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);}

/* PRODUCTION STAGES */
.stage-pipeline{display:flex;gap:0;margin:14px 0;position:relative;}
.stage-pipeline::before{content:'';position:absolute;top:22px;left:0;right:0;height:2px;background:var(--border);z-index:0;}
.stage-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;cursor:pointer;}
.stage-dot{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;margin-bottom:5px;}
.stage-step.done .stage-dot{background:rgba(34,197,94,.15);border-color:var(--green);}
.stage-step.partial .stage-dot{background:rgba(240,165,0,.15);border-color:var(--accent);}
.stage-step.active-s .stage-dot{background:rgba(59,130,246,.15);border-color:var(--accent2);box-shadow:0 0 0 4px rgba(59,130,246,.15);}
.stage-name{font-size:9px;font-family:var(--font-m);color:var(--muted);text-transform:uppercase;letter-spacing:.4px;text-align:center;}
.stage-qty{font-size:10px;font-weight:600;text-align:center;margin-top:2px;}
.stage-pct{font-size:9px;color:var(--muted);text-align:center;}
.sku-stage-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;}
.sku-stage-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.stage-input-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:12px;}
.stage-inp-wrap{background:var(--surface2);border-radius:8px;padding:10px;}
.stage-inp-icon{font-size:20px;margin-bottom:4px;}
.stage-inp-lbl{font-size:9px;font-family:var(--font-m);color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.stage-inp-field{display:flex;align-items:center;gap:5px;}
.stage-inp-field input{background:var(--surface3);border:1px solid var(--border);color:var(--text);font-family:var(--font-m);font-size:13px;font-weight:600;padding:6px 8px;border-radius:5px;outline:none;width:80px;text-align:right;}
.stage-inp-field input:focus{border-color:var(--accent2);}
.stage-inp-field span{font-size:10px;color:var(--muted);}
.stage-progress-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:6px;}
.stage-progress-fill{height:100%;border-radius:3px;transition:width .4s;}
.stage-note-wrap{margin-top:8px;}
.stage-note-wrap textarea{font-size:11px;padding:6px 8px;background:var(--surface3);border:1px solid var(--border);border-radius:5px;resize:none;width:100%;}
.overall-progress{background:var(--surface2);border-radius:8px;padding:12px 14px;margin:10px 0 14px;}
.overall-bar{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;margin-top:6px;}
.overall-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--green));border-radius:4px;transition:width .4s;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ELECTRO <span style="color:var(--text);font-size:24px">APPARELS</span></div>
    <div class="login-sub">Supplier Portal</div>
    <div class="login-title">Who are you?</div>
    <div class="login-hint">Select your supplier name to access your POs and dispatch schedule</div>
    <div id="supList"></div>
    <button class="btn-login" id="loginBtn" disabled onclick="doLogin()">Enter Portal →</button>
    <div style="margin-top:14px;font-size:10px;color:var(--muted)">Contact Electro Apparels if your name is not listed</div>
  </div>
</div>

<!-- PORTAL SCREEN -->
<div id="portalScreen">
  <div class="portal-header">
    <div style="display:flex;align-items:center;gap:16px;min-width:0">
      <div class="portal-logo">ELECTRO <span>SUPPLIER PORTAL</span></div>
      <div id="headerSKUs" style="display:none;align-items:center;gap:5px;flex-wrap:wrap"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="sup-badge" id="supBadge"></div>
      <button class="btn btn-s" style="font-size:11px;padding:5px 10px" onclick="doLogout()">← Switch</button>
    </div>
  </div>

  <div class="portal-body">
    <div class="refresh-bar">
      <span>📡 Data syncs with Electro Apparels' planner</span>
      <button class="btn btn-s" style="font-size:10px;padding:4px 10px" onclick="refreshData()">↻ Refresh</button>
    </div>

    <!-- TABS -->
    <div class="ptab-row">
      <button class="ptab active" onclick="showPTab('mypos',this)">📦 My POs</button>
      <button class="ptab" onclick="showPTab('production',this)">🏗️ Production Status</button>
      <button class="ptab" onclick="showPTab('dispatch',this)">🚛 Dispatch Plan</button>
      <button class="ptab" onclick="showPTab('summary',this)">📊 Summary</button>
    </div>

    <div id="pview-mypos"></div>
    <div id="pview-production" style="display:none"></div>
    <div id="pview-dispatch" style="display:none"></div>
    <div id="pview-summary" style="display:none"></div>
  </div>
</div>

<script>
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let currentSupplier=null;
let masterState=null;
let pendingUpdates=[];

// ===== DATE UTILS =====
function pd(v){if(!v)return null;if(v instanceof Date)return isNaN(v)?null:v;const s=String(v).trim();const m1=s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);if(m1)return new Date(+m1[3],+m1[2]-1,+m1[1]);const m2=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m2)return new Date(+m2[1],+m2[2]-1,+m2[3]);const d=new Date(s);return isNaN(d)?null:d;}
function fd(v){const d=pd(v);if(!d)return '—';return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function tid(v){const d=pd(v);if(!d||isNaN(d))return '';return d.toISOString().split('T')[0];}
function ddiff(a,b){const da=pd(a),db=pd(b);if(!da||!db)return null;return Math.round((da-db)/(864e5));}
function isOverdue(v){const d=pd(v);if(!d)return false;return d<new Date();}
function isDelayed(p){const del=pd(p.deliveryDate);const eff=pd(p.extDate||p.apptDate);if(!del||!eff)return false;return eff>del;}
function getMonthKey(p){const d=pd(p.extDate||p.apptDate||p.deliveryDate);if(!d)return 'Unknown';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function getMonthLabel(k){if(k==='Unknown')return k;const[y,m]=k.split('-');return MONTHS[+m-1]+' '+y;}

// ===== LOAD DATA =====
function loadMasterState(){
  try{
    const raw=localStorage.getItem('electroDispatch_state');
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

// Merge any pending updates INTO the master state view
function applyPendingUpdates(state){
  if(!state)return;
  pendingUpdates.forEach(u=>{
    const po=state.pos.find(p=>p.id===u.poId);
    if(po){
      if(u.apptDate!==undefined)po.apptDate=u.apptDate;
      if(u.extDate!==undefined)po.extDate=u.extDate;
      if(u.delayReason!==undefined)po.delayReason=u.delayReason;
      if(u.supplierNote!==undefined)po.supplierNote=u.supplierNote;
    }
  });
}

function saveUpdate(poId,fields){
  pendingUpdates=pendingUpdates.filter(u=>u.poId!==poId);
  pendingUpdates.push({poId,...fields,ts:Date.now()});
  try{
    const existing=JSON.parse(localStorage.getItem('electroDispatch_supplierUpdates')||'[]');
    const merged=existing.filter(u=>u.poId!==poId);
    merged.push({poId,...fields,ts:Date.now()});
    localStorage.setItem('electroDispatch_supplierUpdates',JSON.stringify(merged));
  }catch(e){}
}

function refreshData(){
  masterState=loadMasterState();
  if(masterState)applyPendingUpdates(masterState);
  renderCurrentTab();
  showToast('✓ Data refreshed');
}

// ===== LOGIN =====
function renderLogin(){
  const list=document.getElementById('supList');
  masterState=loadMasterState();
  if(!masterState||!masterState.suppliers||!masterState.suppliers.length){
    list.innerHTML=`<div class="no-sup">⚠️ No suppliers found.<br>Open the main planner, add suppliers, then reload this page.</div>`;
    return;
  }
  const skuMap=masterState.skuSupplierMap||{};
  // Build SKU info: article → {desc, totalQty}
  const skuInfo={};
  (masterState.pos||[]).forEach(p=>{
    const art=p.article||'Unknown';
    if(!skuInfo[art])skuInfo[art]={desc:p.description||'',qty:0};
    skuInfo[art].qty+=p.qty;
  });
  // Build per-supplier SKU list from mapping
  const supSKUs={};
  Object.entries(skuMap).forEach(([art,sid])=>{
    if(!supSKUs[sid])supSKUs[sid]=[];
    supSKUs[sid].push(art);
  });

  list.innerHTML=masterState.suppliers.map(s=>{
    const mySKUs=supSKUs[s.id]||[];
    return `
    <div class="sup-card" id="sc-${s.id}" onclick="selectSup('${s.id}')">
      <div class="sup-dot" style="background:${s.color||'#888'};flex-shrink:0;margin-top:3px"></div>
      <div style="flex:1;min-width:0">
        <div class="sup-card-name">${s.name}</div>
        <div class="sup-card-meta">${s.city||''}${s.city&&s.contact?' · ':''}${s.contact||''}</div>
        ${mySKUs.length?`
        <div style="margin-top:7px;padding-top:7px;border-top:1px solid var(--border)">
          <div style="font-size:9px;font-family:var(--font-m);color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Your SKUs</div>
          ${mySKUs.map(art=>{
            const info=skuInfo[art]||{desc:'',qty:0};
            return `<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;padding:5px 8px;background:var(--surface3);border-radius:5px;border-left:3px solid ${s.color||'#888'}">
              <div style="flex:1;min-width:0">
                <div style="font-family:var(--font-m);font-size:10px;color:${s.color||'var(--accent)'};">${art}</div>
                <div style="font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px">${info.desc||'—'}</div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-family:var(--font-m);font-size:11px;font-weight:600;color:var(--text)">${info.qty.toLocaleString('en-IN')}</div>
                <div style="font-size:9px;color:var(--muted)">pcs</div>
              </div>
            </div>`;
          }).join('')}
        </div>`
        :`<div style="margin-top:6px;font-size:10px;color:var(--muted);font-style:italic">No SKUs mapped yet</div>`}
      </div>
    </div>`;
  }).join('');
}

let selectedSupId=null;
function selectSup(id){
  selectedSupId=id;
  document.querySelectorAll('.sup-card').forEach(c=>c.classList.remove('selected'));
  const card=document.getElementById('sc-'+id);
  if(card)card.classList.add('selected');
  document.getElementById('loginBtn').disabled=false;
}

function doLogin(){
  if(!selectedSupId)return;
  currentSupplier=masterState.suppliers.find(s=>s.id===selectedSupId);
  if(!currentSupplier)return;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('portalScreen').style.display='block';
  // Set supplier badge
  const badge=document.getElementById('supBadge');
  badge.innerHTML=`<div style="width:10px;height:10px;border-radius:50%;background:${currentSupplier.color||'#888'}"></div><span>${currentSupplier.name}</span>`;
  badge.style.background=`${currentSupplier.color||'#888'}15`;
  badge.style.border=`1px solid ${currentSupplier.color||'#888'}40`;
  badge.style.color=currentSupplier.color||'#888';
  // Show SKU chips in header
  const skuMap=masterState.skuSupplierMap||{};
  const mySKUs=Object.entries(skuMap).filter(([,sid])=>sid===currentSupplier.id).map(([art])=>art);
  const skuStrip=document.getElementById('headerSKUs');
  if(skuStrip){
    skuStrip.innerHTML=mySKUs.length
      ? mySKUs.map(art=>`<span style="font-size:10px;font-family:var(--font-m);padding:2px 8px;border-radius:3px;background:${currentSupplier.color||'#888'}18;color:${currentSupplier.color||'#888'};border:1px solid ${currentSupplier.color||'#888'}33">${art}</span>`).join('')
      : `<span style="font-size:10px;color:var(--muted)">No SKUs mapped</span>`;
    skuStrip.style.display='flex';
  }
  renderMyPOs();
}

function doLogout(){
  currentSupplier=null;selectedSupId=null;pendingUpdates=[];
  document.getElementById('portalScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginBtn').disabled=true;

function checkDelay(poId){
  const apptEl=document.getElementById('appt-'+poId);
  const extEl=document.getElementById('ext-'+poId);
  const warnEl=document.getElementById('delayWarn-'+poId);
  const reqEl=document.getElementById('delayReq-'+poId);
  if(!apptEl||!warnEl)return;
  const po=getMyPOs().find(p=>p.id===poId);
  if(!po)return;
  const eff=extEl?.value||apptEl.value;
  const del=po.deliveryDate;
  if(eff&&del&&eff>del){
    const days=ddiff(pd(eff),pd(del));
    warnEl.style.display='block';
    warnEl.textContent=`⚠️ Your date is ${days} day(s) after the PO expected delivery date (${fd(del)}). Please provide a delay reason.`;
    if(reqEl)reqEl.textContent='*';
  }else{
    warnEl.style.display='none';
    if(reqEl)reqEl.textContent='';
  }
}

function savePOUpdate(poId){
  const apptEl=document.getElementById('appt-'+poId);
  const extEl=document.getElementById('ext-'+poId);
  const reasonEl=document.getElementById('reason-'+poId);
  const noteEl=document.getElementById('note-'+poId);
  const confirmEl=document.getElementById('saveConfirm-'+poId);

  const apptDate=apptEl?.value||'';
  const extDate=extEl?.value||'';
  const eff=extDate||apptDate;
  const po=getMyPOs().find(p=>p.id===poId);
  if(!po)return;

  // Check delay requires reason
  if(eff&&po.deliveryDate&&eff>po.deliveryDate&&!reasonEl?.value.trim()){
    reasonEl.style.borderColor='var(--orange)';
    reasonEl.focus();
    showToast('⚠️ Please enter a delay reason first');
    return;
  }
  reasonEl.style.borderColor='';

  const fields={
    apptDate,extDate,
    delayReason:reasonEl?.value||'',
    supplierNote:noteEl?.value||''
  };

  if(masterState){
    const idx=masterState.pos.findIndex(p=>p.id===poId);
    if(idx>=0)Object.assign(masterState.pos[idx],fields);
  }
  saveUpdate(poId,fields);

  // Show confirmation
  if(confirmEl){confirmEl.style.display='block';setTimeout(()=>confirmEl.style.display='none',3000);}
  showToast('✅ Saved! Electro Apparels will see your update.');
}

// Load production status from localStorage
function loadProductionStatus(){
  try{
    const raw=localStorage.getItem('electroDispatch_production_'+currentSupplier?.id);
    return raw?JSON.parse(raw):{};
  }catch(e){return {};}
}
// Save production status to localStorage
function saveProductionStatus(status){
  try{
    localStorage.setItem('electroDispatch_production_'+currentSupplier?.id,JSON.stringify(status));
    const all=JSON.parse(localStorage.getItem('electroDispatch_allProduction')||'{}');
    all[currentSupplier.id]={supplierId:currentSupplier.id,supplierName:currentSupplier.name,status,updatedAt:new Date().toISOString()};
    localStorage.setItem('electroDispatch_allProduction',JSON.stringify(all));
  }catch(e){}
}

function focusStageInput(article,stageKey){
  const id='prod-'+article.replace(/[^a-z0-9]/gi,'_')+'-'+stageKey;
  const el=document.getElementById(id);
  if(el){el.focus();el.select();}
}

function liveUpdateStage(article,stageKey,val,totalQty){
  const artKey=article.replace(/[^a-z0-9]/gi,'_');
  const barEl=document.getElementById('bar-'+artKey+'-'+stageKey);
  const inpEl=document.getElementById('prod-'+artKey+'-'+stageKey);
  const v=Math.max(0,Math.min(parseInt(val)||0,totalQty));
  const pct=totalQty>0?Math.min(100,Math.round(v/totalQty*100)):0;
  const stage=STAGES.find(s=>s.key===stageKey);
  if(barEl&&stage)barEl.style.width=pct+'%';
  if(inpEl&&stage)inpEl.style.borderColor=v>0?stage.color:'';
}

function saveSKUProduction(article,totalQty){
  const artKey=article.replace(/[^a-z0-9]/gi,'_');
  const prodStatus=loadProductionStatus();
  if(!prodStatus[article])prodStatus[article]={};

  STAGES.forEach(s=>{
    const el=document.getElementById('prod-'+artKey+'-'+s.key);
    prodStatus[article][s.key]=parseInt(el?.value||0)||0;
  });
  const noteEl=document.getElementById('prodnote-'+artKey);
  prodStatus[article].note=noteEl?.value||'';
  prodStatus[article].updatedAt=new Date().toISOString();

  saveProductionStatus(prodStatus);
  const conf=document.getElementById('prodconfirm-'+artKey);
  if(conf){conf.style.display='block';setTimeout(()=>conf.style.display='none',2500);}
  showToast(`✅ Production status saved for ${article}`);
  renderProduction();
}

    }).join('')}`;

// ===== AI HELPERS =====
const SUP_AI_MODEL='claude-sonnet-4-20250514';
async function callSupAI(system,user,maxTokens=400){
  const body=JSON.stringify({model:SUP_AI_MODEL,max_tokens:maxTokens,
    system,messages:[{role:'user',content:user}]});
  const headers={'Content-Type':'application/json'};
  let resp;
  try{
    resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,body});
    if(!resp.ok)throw new Error('direct blocked');
  }catch(e){
    resp=await fetch('https://corsproxy.io/?'+encodeURIComponent('https://api.anthropic.com/v1/messages'),{method:'POST',headers,body});
  }
  const d=await resp.json();
  return d.content?.find(c=>c.type==='text')?.text||'';
}

function getStageDataForSKU(article){
  const prodStatus=loadProductionStatus();
  const st=prodStatus[article]||{};
  const totalQty=getMyPOs().filter(p=>(p.article||'Unknown')===article).reduce((a,p)=>a+p.qty,0);
  return {st,totalQty,
    yarn:parseInt(st.yarn||0),dyeing:parseInt(st.dyeing||0),fabric:parseInt(st.fabric||0),
    cutting:parseInt(st.cutting||0),stitching:parseInt(st.stitching||0),
    packing:parseInt(st.packing||0),ready:parseInt(st.ready||0)
  };
}

// 1. AI suggest delay reason based on current production stage
async function aiSuggestReason(poId,article){
  const reasonEl=document.getElementById('reason-'+poId);
  if(!reasonEl)return;
  reasonEl.placeholder='🤖 Thinking…';
  const sd=getStageDataForSKU(article);
  const stages=`Yarn:${sd.yarn} Dyeing:${sd.dyeing} Fabric:${sd.fabric} Cutting:${sd.cutting} Stitching:${sd.stitching} Packing:${sd.packing} Ready:${sd.ready} / Total:${sd.totalQty}`;
  const po=getMyPOs().find(p=>p.id===poId);
  try{
    const text=await callSupAI(
      `You write brief, honest, professional delay reason statements for garment suppliers. Write ONLY the reason text, 1-2 sentences max. No intro, no preamble.`,
      `A garment supplier needs to explain a delivery delay for SKU ${article} (${po?.description||''}).\nProduction stages: ${stages}\nPO deadline: ${fd(po?.deliveryDate)}\nDelivery date given: ${fd(po?.apptDate||po?.extDate)}\n\nBased on which stage has the most work and which is not yet complete, write a realistic and honest delay reason statement.`
    );
    reasonEl.value=text.trim();
    reasonEl.placeholder='';
    showToast('🤖 Delay reason suggested — review and edit before saving');
  }catch(e){
    reasonEl.placeholder='Could not suggest — try again';
  }
}

// 2. AI auto-fill expected delivery date based on production stage
async function aiAutoFillDate(poId,article,totalQty,deliveryDate){
  const apptEl=document.getElementById('appt-'+poId);
  if(!apptEl)return;
  const origPlaceholder=apptEl.placeholder||'';
  const sd=getStageDataForSKU(article);
  const stages=`Yarn:${sd.yarn} Dyeing:${sd.dyeing} Fabric:${sd.fabric} Cutting:${sd.cutting} Stitching:${sd.stitching} Packing:${sd.packing} Ready:${sd.ready} / Total:${totalQty}`;
  const today=new Date().toISOString().split('T')[0];
  showToast('🤖 Estimating delivery date…');
  try{
    const text=await callSupAI(
      `You estimate realistic garment production completion dates. Reply with ONLY a date in YYYY-MM-DD format. Nothing else.`,
      `Today: ${today}. PO deadline: ${deliveryDate}. Total pieces needed: ${totalQty}.\nCurrent production stages: ${stages}.\n\nTypical garment lead times from each stage to ready:\n- Yarn to ready: ~25 days\n- Dyeing to ready: ~20 days\n- Fabric to ready: ~15 days\n- Cutting to ready: ~10 days\n- Stitching to ready: ~6 days\n- Packing to ready: ~2 days\n- Already ready: 1 day\n\nBased on how many pieces are at each stage and how many are yet to start, estimate the realistic delivery completion date. Reply ONLY with the date in YYYY-MM-DD format.`
    ,50);
    const cleaned=text.trim().match(/\d{4}-\d{2}-\d{2}/)?.[0];
    if(cleaned){
      apptEl.value=cleaned;
      checkDelay(poId);
      showToast(`🤖 Suggested date: ${fd(cleaned)} — review before saving`);
    } else {
      showToast('🤖 Could not estimate date — update your production stages first');
    }
  }catch(e){
    showToast('Could not estimate — check connection');
  }
}

// 3. AI pace check — will supplier make the deadline?
async function aiCheckPace(poId,article,totalQty,deliveryDate){
  const resultEl=document.getElementById('aiPaceResult-'+poId);
  if(!resultEl)return;
  resultEl.innerHTML=`<div style="font-size:11px;color:var(--muted);padding:6px 0">🤖 Analysing your production pace…</div>`;
  const sd=getStageDataForSKU(article);
  const stages=`Yarn:${sd.yarn} Dyeing:${sd.dyeing} Fabric:${sd.fabric} Cutting:${sd.cutting} Stitching:${sd.stitching} Packing:${sd.packing} Ready:${sd.ready} / Total:${totalQty}`;
  const today=new Date().toISOString().split('T')[0];
  const daysLeft=ddiff(pd(deliveryDate),new Date());
  try{
    const text=await callSupAI(
      `You are a production planning advisor for a garment supplier. Give a SHORT, direct, honest assessment. Use plain text only — no HTML. Max 3 sentences. Start with either ✅ ON TRACK, ⚠️ AT RISK, or 🔴 WILL MISS.`,
      `Today: ${today}. PO deadline: ${deliveryDate} (${daysLeft} days away). Total pieces: ${totalQty}.\nCurrent production: ${stages}.\n\nAssess: will they make the deadline? What specifically needs to happen? Be specific about which stages need to accelerate.`
    ,200);
    const isRed=text.startsWith('🔴');
    const isWarn=text.startsWith('⚠️');
    const color=isRed?'var(--red)':isWarn?'var(--orange)':'var(--green)';
    const bg=isRed?'rgba(239,68,68,.08)':isWarn?'rgba(249,115,22,.08)':'rgba(34,197,94,.08)';
    const border=isRed?'rgba(239,68,68,.25)':isWarn?'rgba(249,115,22,.25)':'rgba(34,197,94,.25)';
    resultEl.innerHTML=`<div style="background:${bg};border:1px solid ${border};border-radius:6px;padding:9px 12px;font-size:11px;color:${color};line-height:1.6">${text}</div>`;
  }catch(e){
    resultEl.innerHTML=`<div style="font-size:11px;color:var(--muted)">Could not check pace — try again</div>`;
  }
}

// ===== TOAST =====
function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2800);
}
